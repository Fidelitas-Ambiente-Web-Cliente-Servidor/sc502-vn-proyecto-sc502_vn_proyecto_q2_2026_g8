<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>BusMap - Mapa</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <nav class="navbar">
        <a href="menu.html" class="logo">BusMap</a>
        <ul>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="mapa.html">Mapa</a></li>
            <li><a href="perfil.html">Perfil</a></li>
            <li><a href="index.html">Salir</a></li>
        </ul>
    </nav>

    <div class="contenedor">
        <h2>Mapa</h2>

        <div class="formulario" style="max-width: 100%;">
            <label for="busqueda">Buscar parada o ruta</label>
            <input type="text" id="busqueda" placeholder="Ejemplo: San Jose - Cartago">

            <label for="filtroIncidente">Filtrar por tipo de incidente</label>
            <select id="filtroIncidente">
                <option value="todos">Todos</option>
                <option value="retraso">Retraso</option>
                <option value="avistamiento">Avistamiento del bus</option>
                <option value="accidente">Accidente</option>
            </select>
        </div>

        <!-- Este mapa es por mientras, en el futuro vamos a usar uno real -->
        <div class="mapa-placeholder">

            <img src="img/mapa.jpg" alt="Mapa" class="imagenMapa">

            <div class="pin" style="top: 40px; left: 60px;">Bus - Ruta 1</div>
            <div class="pin" style="top: 120px; left: 200px;">Bus - Ruta 3</div>
            <div class="pin" style="top: 190px; left: 100px;">Reporte</div>

        </div>

        <button class="boton" onclick="mostrarFormularioReporte();">Reportar algo aqui</button>

        <div id="formularioReporte" class="formulario" style="display: none;">
            <h3>Nuevo reporte</h3>

            <label for="tipoIncidente">Tipo de incidente</label>
            <select id="tipoIncidente">
                <option value="">Seleccione...</option>
                <option value="retraso">Retraso</option>
                <option value="avistamiento">Avistamiento del bus</option>
                <option value="accidente">Accidente</option>
            </select>

            <label for="comentarioReporte">Comentario</label>
            <textarea id="comentarioReporte" placeholder="Describa lo que observo"></textarea>

            <button class="boton" onclick="enviarReporte();">Enviar reporte</button>
            <div id="mensajeReporte"></div>
        </div>

        <h3 style="margin-top: 25px;">Reportes cercanos</h3>
        <ul class="lista-reportes" id="listaReportesCercanos"></ul>

    </div>

    <div class="footer">
        BusMap - Proyecto SC-502, Universidad Fidelitas
    </div>

    <script src="js/script.js"></script>
    <script>
        cargarReportesCercanos();
    </script>
</body>

</html>
