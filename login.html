<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>BusMap - Iniciar sesion</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="logo">BusMap</a>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="registro.html">Registrarse</a></li>
        </ul>
    </nav>

    <div class="contenedor">
        <form class="formulario" onsubmit="return validarLogin();">
            <h2>Iniciar sesion</h2>

            <label for="correo">Correo electronico</label>
            <input type="text" id="correo" name="correo">

            <label for="contrasena">Contrasena</label>
            <input type="password" id="contrasena" name="contrasena">

            <button type="submit" class="boton">Ingresar</button>

            <div id="mensajeLogin"></div>

            <p class="enlace-formulario">
                No tiene cuenta? <a href="registro.html">Registrese aqui</a>
            </p>
        </form>
    </div>

    <div class="footer">
        BusMap - Proyecto SC-502, Universidad Fidelitas
    </div>

    <script src="js/script.js"></script>
</body>

</html>
