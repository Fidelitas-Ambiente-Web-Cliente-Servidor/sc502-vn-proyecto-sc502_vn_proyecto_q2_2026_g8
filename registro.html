<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>BusMap - Registro</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="logo">BusMap</a>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="login.html">Iniciar sesion</a></li>
        </ul>
    </nav>

    <div class="contenedor">
        <form class="formulario" onsubmit="return validarRegistro();">
            <h2>Crear cuenta</h2>

            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre">

            <label for="correo">Correo electronico</label>
            <input type="text" id="correo" name="correo">

            <label for="contrasena">Contrasena</label>
            <input type="password" id="contrasena" name="contrasena">

            <label for="confirmar">Confirmar contrasena</label>
            <input type="password" id="confirmar" name="confirmar">

            <button type="submit" class="boton">Registrarse</button>

            <div id="mensajeRegistro"></div>

            <p class="enlace-formulario">
                Ya tiene cuenta? <a href="login.html">Inicie sesion aqui</a>
            </p>
        </form>
    </div>

    <div class="footer">
        BusMap - Proyecto SC-502, Universidad Fidelitas
    </div>

    <script src="js/script.js"></script>
</body>

</html>
